name: Update Security Feeds

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC daily
  workflow_dispatch:       # manual trigger from GitHub UI
  push:
    branches: [main]
    paths-ignore:
      - 'data/feeds.json'  # avoid infinite loop when the bot commits

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch all feeds
        run: python scripts/fetch_feeds.py

      - name: Commit updated feeds.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/feeds.json
          git diff --staged --quiet \
            || git commit -m "chore: update feeds $(date -u +%Y-%m-%d)"
          git push
